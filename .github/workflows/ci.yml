name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: diffpype_ci
          POSTGRES_PASSWORD: diffpype_ci
          POSTGRES_DB: diffpype_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://diffpype_ci:diffpype_ci@localhost:5432/diffpype_ci
      TEST_DATABASE_URL: postgresql+psycopg2://diffpype_ci:diffpype_ci@localhost:5432/diffpype_ci
      REDIS_URL: redis://localhost:6379/0
      ADMIN_USER: sysadmin
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_SECRET_KEY: ${{ secrets.ADMIN_SECRET_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen --group test

      - name: Run pre-commit (ruff + mypy)
        run: uv run pre-commit run --all-files

      - name: Install Sphinx dependencies
        run: uv pip install -r docs/sphinx_requirements.txt

      - name: Build Sphinx documentation
        run: uv run sphinx-build -b html docs docs/_build/html -W

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            --junitxml=results.xml | tee pytest-output.txt
          exit_code=${PIPESTATUS[0]}
          {
            echo "## Coverage Report"
            echo
            echo '```'
            awk '/^---------- coverage:/,0' pytest-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$exit_code"

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: results.xml

  # Build and push images to ghcr.io for the 3-tier environment strategy.
  # Runs only on push events (not PRs) after the test job passes.
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: api
            dockerfile: docker/api.Dockerfile
          - image: worker
            dockerfile: docker/worker.Dockerfile
          - image: db
            dockerfile: docker/db.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.image }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
