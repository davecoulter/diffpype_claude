name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    # NOTE: Postgres is built from docker/db.Dockerfile and run manually below
    # rather than declared as a `services:` container, because the migrations in
    # this repo require the Q3C spatial extension, which only exists in the
    # project's custom db image — the stock postgres:16 image does not have it.

    env:
      DATABASE_URL: postgresql+psycopg2://diffpype_ci:diffpype_ci@localhost:5432/diffpype_ci
      TEST_DATABASE_URL: postgresql+psycopg2://diffpype_ci:diffpype_ci@localhost:5432/diffpype_ci
      REDIS_URL: redis://localhost:6379/0
      ADMIN_USER: sysadmin
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_SECRET_KEY: ${{ secrets.ADMIN_SECRET_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Build Q3C-enabled Postgres image
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: docker build -f docker/db.Dockerfile -t diffpype-db:ci .

      - name: Start Postgres
        run: |
          docker run -d --name diffpype-db \
            -e POSTGRES_USER=diffpype_ci \
            -e POSTGRES_PASSWORD=diffpype_ci \
            -e POSTGRES_DB=diffpype_ci \
            -p 5432:5432 \
            diffpype-db:ci

      - name: Wait for Postgres to accept connections
        run: |
          for i in $(seq 1 30); do
            if docker exec diffpype-db pg_isready -U diffpype_ci -d diffpype_ci; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for Postgres... ($i)"
            sleep 2
          done
          echo "Postgres did not become ready in time"
          docker logs diffpype-db
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen --group test

      - name: Run pre-commit (ruff + mypy)
        run: uv run pre-commit run --all-files

      - name: Install Sphinx dependencies
        run: uv pip install -r docs/sphinx_requirements.txt

      - name: Build Sphinx documentation
        run: uv run sphinx-build -b html docs docs/_build/html -W

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            --junitxml=results.xml | tee pytest-output.txt
          exit_code=${PIPESTATUS[0]}
          {
            echo "## Coverage Report"
            echo
            echo '```'
            awk '/^---------- coverage:/,0' pytest-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$exit_code"

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: results.xml

  # Build and push images to ghcr.io for the 3-tier environment strategy.
  # Runs only on push events (not PRs) after the test job passes.
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: api
            dockerfile: docker/api.Dockerfile
          - image: worker
            dockerfile: docker/worker.Dockerfile
          - image: db
            dockerfile: docker/db.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.image }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
