services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-diffpype}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diffpype}
      POSTGRES_DB: ${POSTGRES_DB:-diffpype}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - diffpype_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diffpype}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - diffpype_net

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - diffpype_net

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-diffpype}:${POSTGRES_PASSWORD:-diffpype}@db:5432/${POSTGRES_DB:-diffpype}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - diffpype_net

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-diffpype}:${POSTGRES_PASSWORD:-diffpype}@db:5432/${POSTGRES_DB:-diffpype}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - diffpype_net

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "${UI_PORT:-5173}:5173"
    volumes:
      - ./src/ui:/app
      - diffpype_ui_node_modules:/app/node_modules
    depends_on:
      - api
    networks:
      - diffpype_net

networks:
  diffpype_net:
    name: diffpype_net

volumes:
  diffpype_db_data:
  diffpype_ui_node_modules:
