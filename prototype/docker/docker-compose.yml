services:
    diffpype_db:
        container_name: diffpype_db_arm64
        image: "arm64v8/mysql:8.0.35"
        command: mysqld --default-authentication-plugin=mysql_native_password
        mem_limit: ${MEM_LIMIT}
        ports:
            - "${LOCAL_DB_PORT}:3306"
        volumes:
            - ${VOL_DB}:/var/lib/mysql
#            - ${VOL_DB_RUN}:/var/run/mysqld
            - ./db_init/db_configuration:/etc/mysql/conf.d
            - ./db_init/init.sql:/docker-entrypoint-initdb.d/1.sql
            - ${VOL_DB_LOG}:/var/log/mysql
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_PWD}
        healthcheck:
          test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost", "-p${DB_PWD}"]
          timeout: 20s
          retries: 10
        networks:
          - diffpype_net
    diffpype_script:
      container_name: diffpype_script_arm64
#      image: "ghcr.io/davecoulter/diffpype:1.0.0"
      image: "ghcr.io/davecoulter/diffpype:1.0.3"
      #build: ./diffpype_worker
      ports:
        - "8000:8000"
      mem_limit: ${MEM_LIMIT}
      cpus: ${CPU_LIMIT}
      volumes:
        - ${VOL_APP}:/app
        - ${VOL_APP_IO}:/diffpype_io
      networks:
        - diffpype_net
      environment:
        PYTHONPATH: /app
      depends_on:
        diffpype_db:
          condition: service_healthy
      command: python /app/djangotutorial/manage.py runserver 0.0.0.0:8000
networks:
  diffpype_net:
    name: diffpype_net
