name: diffpype

services:
  db:
    build:
      context: .
      dockerfile: docker/db.Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - diffpype_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - diffpype_net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - diffpype_net

  api:
    image: ghcr.io/davecoulter/diffpype-api:${IMAGE_TAG:-main}
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: diffpype-api
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - diffpype_net

  worker_light:
    image: ghcr.io/davecoulter/diffpype-worker:${IMAGE_TAG:-main}
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CELERY_QUEUES: light,dead_letter
      CELERY_CONCURRENCY: ${CELERY_LIGHT_CONCURRENCY:-4}
      CELERY_MAX_MEMORY_PER_CHILD: ${CELERY_LIGHT_MAX_MEMORY_PER_CHILD:-200000}
      CELERY_TASK_MAX_RETRIES: ${CELERY_TASK_MAX_RETRIES:-3}
      CELERY_TASK_RETRY_DELAY: ${CELERY_TASK_RETRY_DELAY:-60}
      ENABLE_DB_BACKUP_CRON: ${ENABLE_DB_BACKUP_CRON:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: diffpype-worker-light
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - diffpype_net

  worker_heavy:
    image: ghcr.io/davecoulter/diffpype-worker:${IMAGE_TAG:-main}
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CELERY_QUEUES: heavy_memory
      CELERY_CONCURRENCY: ${CELERY_HEAVY_CONCURRENCY:-1}
      CELERY_MAX_MEMORY_PER_CHILD: ${CELERY_HEAVY_MAX_MEMORY_PER_CHILD:-8000000}
      CELERY_TASK_MAX_RETRIES: ${CELERY_TASK_MAX_RETRIES:-3}
      CELERY_TASK_RETRY_DELAY: ${CELERY_TASK_RETRY_DELAY:-60}
      ENABLE_DB_BACKUP_CRON: ${ENABLE_DB_BACKUP_CRON:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: diffpype-worker-heavy
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - diffpype_net

networks:
  diffpype_net:
    name: diffpype_net

volumes:
  diffpype_db_data:
